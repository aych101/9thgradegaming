<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .info {
            color: white;
            margin-bottom: 20px;
            font-size: 1.1em;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
            background: #BBADA0;
            padding: 10px;
            border-radius: 6px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .tile {
            width: 100px;
            height: 100px;
            background: #CDC1B4;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2em;
            color: #776E65;
            transition: all 0.15s ease-in-out;
        }

        .tile.tile-2 { background: #EEE4DA; color: #776E65; }
        .tile.tile-4 { background: #EDE0C8; color: #776E65; }
        .tile.tile-8 { background: #F2B179; color: #F9F6F2; }
        .tile.tile-16 { background: #F59563; color: #F9F6F2; }
        .tile.tile-32 { background: #F67C5F; color: #F9F6F2; }
        .tile.tile-64 { background: #F65E3B; color: #F9F6F2; }
        .tile.tile-128 { background: #EDCF72; color: #095F6B; font-size: 1.5em; }
        .tile.tile-256 { background: #EDCC61; color: #095F6B; font-size: 1.5em; }
        .tile.tile-512 { background: #EDC850; color: #095F6B; font-size: 1.5em; }
        .tile.tile-1024 { background: #EDC53F; color: #095F6B; font-size: 1.3em; }
        .tile.tile-2048 { background: #EDC22E; color: #095F6B; font-size: 1.3em; }

        .controls {
            color: white;
            margin-bottom: 20px;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            min-height: 30px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 2048</h1>
        <div class="info">
            <div>Score: <span id="score">0</span></div>
            <div>Best: <span id="best">0</span></div>
        </div>
        
        <div class="message" id="message"></div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <p>Use Arrow Keys to move tiles</p>
            <p>Combine tiles with the same number to reach 2048!</p>
        </div>

        <button onclick="resetGame()">New Game</button>
        <button class="back-btn" onclick="window.location.href='../index.html'">Back to Hub</button>
    </div>

    <script>
        let board = [];
        let score = 0;
        let best = localStorage.getItem('2048_best') || 0;
        let gameActive = true;

        function initBoard() {
            board = Array(16).fill(0);
            score = 0;
            gameActive = true;
            addNewTile();
            addNewTile();
            updateDisplay();
            document.getElementById('message').textContent = '';
        }

        function addNewTile() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                let index = empty[Math.floor(Math.random() * empty.length)];
                board[index] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateDisplay() {
            const boardDiv = document.getElementById('gameBoard');
            boardDiv.innerHTML = '';
            
            board.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (value > 0) {
                    tile.textContent = value;
                    tile.classList.add('tile-' + value);
                }
                boardDiv.appendChild(tile);
            });

            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
        }

        function canMove() {
            if (board.includes(0)) return true;
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    let current = board[i * 4 + j];
                    if (j < 3 && board[i * 4 + j + 1] === current) return true;
                    if (i < 3 && board[(i + 1) * 4 + j] === current) return true;
                }
            }
            return false;
        }

        function move(direction) {
            if (!gameActive) return;

            let moved = false;
            let newBoard = [...board];

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    let row = [];
                    for (let j = 0; j < 4; j++) {
                        if (newBoard[i * 4 + j] !== 0) {
                            row.push(newBoard[i * 4 + j]);
                        }
                    }

                    if (direction === 'right') row.reverse();

                    for (let j = 0; j < row.length - 1; j++) {
                        if (row[j] === row[j + 1]) {
                            row[j] *= 2;
                            score += row[j];
                            row.splice(j + 1, 1);
                        }
                    }

                    while (row.length < 4) {
                        row.push(0);
                    }

                    if (direction === 'right') row.reverse();

                    for (let j = 0; j < 4; j++) {
                        newBoard[i * 4 + j] = row[j];
                    }
                }
            } else {
                for (let j = 0; j < 4; j++) {
                    let column = [];
                    for (let i = 0; i < 4; i++) {
                        if (newBoard[i * 4 + j] !== 0) {
                            column.push(newBoard[i * 4 + j]);
                        }
                    }

                    if (direction === 'down') column.reverse();

                    for (let i = 0; i < column.length - 1; i++) {
                        if (column[i] === column[i + 1]) {
                            column[i] *= 2;
                            score += column[i];
                            column.splice(i + 1, 1);
                        }
                    }

                    while (column.length < 4) {
                        column.push(0);
                    }

                    if (direction === 'down') column.reverse();

                    for (let i = 0; i < 4; i++) {
                        newBoard[i * 4 + j] = column[i];
                    }
                }
            }

            moved = newBoard.some((v, i) => v !== board[i]);
            if (moved) {
                board = newBoard;
                addNewTile();
                updateDisplay();

                if (score > best) {
                    best = score;
                    localStorage.setItem('2048_best', best);
                }

                if (!canMove()) {
                    gameActive = false;
                    document.getElementById('message').textContent = 'Game Over!';
                }
            }
        }

        function resetGame() {
            initBoard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); move('left'); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); move('right'); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); move('up'); }
            else if (e.key === 'ArrowDown') { e.preventDefault(); move('down'); }
        });

        initBoard();
    </script>
</body>
</html>
