<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pirate Naval Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #2c5aa0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            color: white;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 1.4em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            color: #ffd700;
            font-weight: bold;
            font-size: 0.9em;
        }

        #gameCanvas {
            display: block;
            flex: 1;
            width: 100%;
            background: linear-gradient(180deg, #1a5a8a 0%, #0d3d5c 100%);
            border: none;
            position: relative;
        }

        .joystick-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(100, 150, 200, 0.2);
            border: 2px solid rgba(200, 220, 255, 0.4);
            border-radius: 50%;
            z-index: 100;
        }

        .joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00ff00, #00aa00);
            border: 2px solid #00ff00;
            border-radius: 50%;
            z-index: 101;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .fire-button {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #ff6666, #cc0000);
            border: 3px solid #ffaa00;
            border-radius: 50%;
            z-index: 100;
            font-size: 2em;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .fire-button:active {
            transform: scale(0.95);
            background: radial-gradient(circle, #ff4444, #aa0000);
            box-shadow: 0 0 30px rgba(255, 0, 0, 1);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            z-index: 2000;
            display: none;
            min-width: 280px;
            border: 3px solid #ffd700;
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .game-over p {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .game-over button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .game-over button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚓ Pirate Naval Battle</h1>
            <div class="stats">
                <div>❤️ Health: <span id="health">100</span></div>
                <div>💀 Kills: <span id="kills">0</span></div>
                <div>⭐ Score: <span id="score">0</span></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="joystick-base" id="joystickBase">
            <div class="joystick-knob" id="joystickKnob"></div>
        </div>

        <button class="fire-button" id="fireButton">🔫</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Kills: <span id="finalKills">0</span></p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const joystickBase = document.getElementById('joystickBase');
        const joystickKnob = document.getElementById('joystickKnob');
        const fireButton = document.getElementById('fireButton');

        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 60;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let playerShip = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            width: 30,
            height: 40,
            vx: 0,
            vy: 0,
            speed: 5,
            health: 100
        };

        let bullets = [];
        let enemies = [];
        let score = 0;
        let kills = 0;
        let gameActive = true;
        let fireRate = 0;
        let spawnRate = 0;

        // Joystick variables
        let joystickActive = false;
        let joystickX = 0;
        let joystickY = 0;
        const joystickRadius = 60;
        const joystickBaseRadius = 50;

        // Fire button state
        let fireActive = false;

        // Joystick touch handlers
        canvas.addEventListener('touchstart', (e) => {
            for (let touch of e.touches) {
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                // Check if touch is in joystick area (left side)
                const dist = Math.hypot(x - joystickRadius - 30, y - (canvas.height - joystickRadius - 30));
                if (dist < joystickRadius) {
                    joystickActive = true;
                }

                // Check if touch is in fire button area (right side)
                const fireX = canvas.width - 100 - 30;
                const fireY = canvas.height - 100 - 30;
                const fireDist = Math.hypot(x - fireX - 50, y - fireY - 50);
                if (fireDist < 50) {
                    fireActive = true;
                }
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                if (joystickActive) {
                    const baseX = joystickRadius + 30;
                    const baseY = canvas.height - joystickRadius - 30;
                    const dx = x - baseX;
                    const dy = y - baseY;
                    const dist = Math.hypot(dx, dy);
                    const angle = Math.atan2(dy, dx);

                    if (dist > joystickBaseRadius) {
                        joystickX = Math.cos(angle) * joystickBaseRadius;
                        joystickY = Math.sin(angle) * joystickBaseRadius;
                    } else {
                        joystickX = dx;
                        joystickY = dy;
                    }
                }
            }
        });

        canvas.addEventListener('touchend', (e) => {
            joystickActive = false;
            fireActive = false;
            joystickX = 0;
            joystickY = 0;
        });

        // Fire button handlers
        fireButton.addEventListener('mousedown', () => { fireActive = true; });
        fireButton.addEventListener('mouseup', () => { fireActive = false; });
        fireButton.addEventListener('touchstart', (e) => { e.preventDefault(); fireActive = true; });
        fireButton.addEventListener('touchend', (e) => { e.preventDefault(); fireActive = false; });

        // Keyboard controls
        const keys = {};
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w') keys['up'] = true;
            if (e.key === 'ArrowDown' || e.key === 's') keys['down'] = true;
            if (e.key === 'ArrowLeft' || e.key === 'a') keys['left'] = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys['right'] = true;
            if (e.key === ' ') { e.preventDefault(); fireActive = true; }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w') keys['up'] = false;
            if (e.key === 'ArrowDown' || e.key === 's') keys['down'] = false;
            if (e.key === 'ArrowLeft' || e.key === 'a') keys['left'] = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys['right'] = false;
            if (e.key === ' ') fireActive = false;
        });

        function drawShip(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x + width / 2, y);
            ctx.lineTo(x + width, y + height);
            ctx.lineTo(x, y + height);
            ctx.closePath();
            ctx.fill();
        }

        function drawJoystick() {
            const baseX = joystickRadius + 30;
            const baseY = canvas.height - joystickRadius - 30;

            // Base circle
            ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
            ctx.beginPath();
            ctx.arc(baseX, baseY, joystickBaseRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(200, 220, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Knob
            ctx.fillStyle = 'rgba(0, 255, 0, 0.8)';
            ctx.shadowColor = 'rgba(0, 255, 0, 0.6)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(baseX + joystickX, baseY + joystickY, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawFireButton() {
            const fireX = canvas.width - 100 - 30;
            const fireY = canvas.height - 100 - 30;

            // Button circle
            ctx.fillStyle = fireActive ? 'rgba(255, 68, 68, 0.9)' : 'rgba(255, 100, 100, 0.7)';
            ctx.shadowColor = 'rgba(255, 0, 0, 0.8)';
            ctx.shadowBlur = fireActive ? 30 : 15;
            ctx.beginPath();
            ctx.arc(fireX + 50, fireY + 50, 45, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 35px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 5;
            ctx.fillText('🔫', fireX + 50, fireY + 50);
            ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameActive) return;

            // Player movement from joystick
            playerShip.vx = (joystickX / joystickBaseRadius) * playerShip.speed;
            playerShip.vy = (joystickY / joystickBaseRadius) * playerShip.speed;

            // Keyboard controls (for testing)
            if (keys['up']) playerShip.vy = -playerShip.speed;
            if (keys['down']) playerShip.vy = playerShip.speed;
            if (keys['left']) playerShip.vx = -playerShip.speed;
            if (keys['right']) playerShip.vx = playerShip.speed;

            playerShip.x += playerShip.vx;
            playerShip.y += playerShip.vy;

            // Boundaries
            playerShip.x = Math.max(0, Math.min(playerShip.x, canvas.width - playerShip.width));
            playerShip.y = Math.max(0, Math.min(playerShip.y, canvas.height - playerShip.height));

            // Firing
            if (fireActive && fireRate === 0) {
                bullets.push({
                    x: playerShip.x + playerShip.width / 2,
                    y: playerShip.y,
                    vx: 0,
                    vy: -8,
                    width: 4,
                    height: 10
                });
                fireRate = 5;
            }
            if (fireRate > 0) fireRate--;

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // Spawn enemies
            spawnRate++;
            if (spawnRate > Math.max(30, 100 - kills * 2)) {
                enemies.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -40,
                    width: 30,
                    height: 40,
                    vx: (Math.random() - 0.5) * 2,
                    vy: 2 + kills * 0.1,
                    health: 1,
                    bullets: []
                });
                spawnRate = 0;
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].x += enemies[i].vx;
                enemies[i].y += enemies[i].vy;

                // Enemy shooting
                if (Math.random() < 0.02) {
                    enemies[i].bullets.push({
                        x: enemies[i].x + enemies[i].width / 2,
                        y: enemies[i].y + enemies[i].height,
                        vx: 0,
                        vy: 5,
                        width: 4,
                        height: 10
                    });
                }

                // Update enemy bullets
                for (let j = enemies[i].bullets.length - 1; j >= 0; j--) {
                    enemies[i].bullets[j].y += enemies[i].bullets[j].vy;
                    if (enemies[i].bullets[j].y > canvas.height) {
                        enemies[i].bullets.splice(j, 1);
                    }
                }

                // Collision with player bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (bullets[j].x < enemies[i].x + enemies[i].width &&
                        bullets[j].x + bullets[j].width > enemies[i].x &&
                        bullets[j].y < enemies[i].y + enemies[i].height &&
                        bullets[j].y + bullets[j].height > enemies[i].y) {
                        enemies[i].health--;
                        score += 5;
                        bullets.splice(j, 1);
                        if (enemies[i].health <= 0) {
                            enemies.splice(i, 1);
                            kills++;
                            score += 50;
                            i--;
                        }
                        break;
                    }
                }

                // Collision with player
                if (enemies[i] && enemies[i].x < playerShip.x + playerShip.width &&
                    enemies[i].x + enemies[i].width > playerShip.x &&
                    enemies[i].y < playerShip.y + playerShip.height &&
                    enemies[i].y + enemies[i].height > playerShip.y) {
                    playerShip.health -= 5;
                    enemies.splice(i, 1);
                    i--;
                }

                // Enemy escaped
                if (enemies[i] && enemies[i].y > canvas.height) {
                    playerShip.health -= 10;
                    enemies.splice(i, 1);
                    i--;
                }

                // Enemy bullet collision
                if (enemies[i]) {
                    for (let j = enemies[i].bullets.length - 1; j >= 0; j--) {
                        if (enemies[i].bullets[j].x < playerShip.x + playerShip.width &&
                            enemies[i].bullets[j].x + enemies[i].bullets[j].width > playerShip.x &&
                            enemies[i].bullets[j].y < playerShip.y + playerShip.height &&
                            enemies[i].bullets[j].y + enemies[i].bullets[j].height > playerShip.y) {
                            playerShip.health -= 5;
                            enemies[i].bullets.splice(j, 1);
                        }
                    }
                }
            }

            if (playerShip.health <= 0) {
                gameActive = false;
                endGame();
            }

            // Update UI
            document.getElementById('health').textContent = Math.max(0, playerShip.health);
            document.getElementById('kills').textContent = kills;
            document.getElementById('score').textContent = score;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(13, 61, 92, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw player ship
            drawShip(playerShip.x, playerShip.y, playerShip.width, playerShip.height, '#00ff00');

            // Draw bullets
            ctx.fillStyle = '#ffff00';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
            });

            // Draw enemies
            enemies.forEach(enemy => {
                drawShip(enemy.x, enemy.y, enemy.width, enemy.height, '#dd0000');

                ctx.fillStyle = '#ff8844';
                enemy.bullets.forEach(bullet => {
                    ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                });
            });

            // Draw joystick and fire button
            drawJoystick();
            drawFireButton();
        }

        function endGame() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('gameOver').style.display = 'block';
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
