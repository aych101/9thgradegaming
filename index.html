<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9th Grade Gaming Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .game-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }

        .game-icon {
            font-size: 3.5em;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .game-info {
            padding: 20px;
        }

        .game-info h2 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.4em;
        }

        .game-info p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            background: #ffd700;
            color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 8px;
            font-weight: bold;
        }

        .game-card:hover .game-icon {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .game-card:hover .game-info h2 {
            color: #764ba2;
        }

        .footer {
            color: white;
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 9th Grade Gaming Hub</h1>
        <p class="subtitle">Unblocked Games for Everyone!</p>

        <div class="games-grid">
            <a href="games/pirate-battle.html" class="game-card">
                <div class="game-icon">⚓</div>
                <div class="game-info">
                    <h2>Pirate Naval Battle</h2>
                    <p>Destroy enemy ships while defending your own! Original naval combat game.</p>
                    <span class="badge">📱 Mobile Friendly</span>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>&copy; 2026 9th Grade Gaming. Have fun and enjoy! 🎮</p>
            <p>More games coming soon!</p>
        </div>
    </div>
</body>
</html>
